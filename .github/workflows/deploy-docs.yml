name: Deploy docs (Blume) to GitHub Pages

# Builds the Blume site in ./blume and publishes it to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "blume/**"
      - "howto/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blume
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: blume/package-lock.json

      - name: Sync diagrams from howto into public
        run: |
          cp ../howto/skill-architecture.svg public/
          cp ../howto/runtime-loop.svg public/
          cp ../howto/weekly-update.svg public/
          cp ../howto/roadmap.svg public/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blume/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
